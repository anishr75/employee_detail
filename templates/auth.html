<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auth</title>

  <style>
    :root{
    --bg1:#ffffff;
    --bg2:#ffffff;
    --card:#ffffff;
    --text:#111111;
    --muted:#6b7280;
    --border:#d1d5db;
    --primary:#000000;
    --primary2:#1f1f1f;
    --shadow: 0 18px 60px rgba(0,0,0,.25);
    --radius:18px;
    }

    *{box-sizing:border-box}
    body{
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
        background: linear-gradient(180deg, var(--bg1), var(--bg2));
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
        color:var(--text);
    }

    .shell{width:min(520px, 100%);}

    .card{
        background: rgba(255,255,255,.96);
        border:1px solid rgba(209,213,219,.8);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow:hidden;
        }

    .head{padding:22px 22px 12px; text-align:center;}

    .avatar{
        width:56px;
        height:56px;
        border-radius:18px;
        margin:0 auto 10px;
        background: linear-gradient(135deg, #000000, #3a3a3a);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-weight:900;
        font-size:22px;
        user-select:none;
    }

    h1{margin:0; font-size:28px; line-height:1.1; font-weight:1000;}
    .sub{margin:8px 0 0; color:var(--muted); font-size:14px;}

    .tabs{
      display:flex;
      gap:10px;
      padding:0 22px 14px;
      justify-content:center;
    }
    .tab{
        border:1px solid #d1d5db;
        background:#fff;
        border-radius:999px;
        padding:10px 14px;
        font-weight:900;
        cursor:pointer;
        color:#111827;
    }
    
    .tab.active{
        background:#000000;
        color:#ffffff;
        border-color:transparent;
        box-shadow:0 12px 25px rgba(0,0,0,.18);
    }

    .flashwrap{padding:0 22px 6px;}
    .flash{
      padding:10px 12px;
      border-radius:14px;
      margin:0 0 10px;
      border:1px solid rgba(234,220,255,.95);
      font-weight:900;
      font-size:14px;
    }
    .flash.error{background:#fee2e2; border-color:#fecaca; color:#991b1b;}
    .flash.success{background:#dcfce7; border-color:#bbf7d0; color:#166534;}
    .flash.info{background:#e0f2fe; border-color:#bae6fd; color:#075985;}
    .flash.warning{background:#fef9c3; border-color:#fde68a; color:#854d0e;}

    form{padding:14px 22px 22px; display:none;}
    form.active{display:block;}

    .field{margin-bottom:14px;}
    label{
      display:block;
      font-size:13px;
      font-weight:900;
      margin:0 0 6px;
    }

    .control{
        position:relative;
        display:flex;
        align-items:center;
        gap:10px;
        padding:12px 12px;
        border-radius:14px;
        border:1px solid #d1d5db;
        background:#ffffff;
    }
    .control:focus-within{
        border-color:#000000;
        box-shadow:0 0 0 4px rgba(0,0,0,.12);
    }

    .icon{
      width:18px;
      height:18px;
      opacity:.7;
      flex: 0 0 auto;
    }

    input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
      font-size:14px;
      color:var(--text);
    }

    .eye{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:6px;
      border-radius:10px;
      color:#4b5563;
      flex: 0 0 auto;
    }
    .eye:hover{background: rgba(0,0,0,.08);}

    .btn{
        width:100%;
        border:none;
        cursor:pointer;
        padding:12px 14px;
        border-radius:14px;
        font-weight:1000;
        background:#000000;
        color:#ffffff;
        box-shadow:0 12px 25px rgba(0,0,0,.18);
        margin-top:4px;
    }

    .btn:hover{
        background:#222222;
    }

    .linkrow{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }
    
    .linkrow a{
        color:#000000;
        font-weight:900;
        text-decoration:none;
    }
    .linkrow a:hover{
        text-decoration:underline;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="card">
      <div class="head">
        <div class="avatar">👤</div>
        <h1 id="titleText">Welcome Back</h1>
        <p class="sub" id="subText">Sign in to access your inventory</p>
      </div>

      <div class="tabs">
        <button class="tab active" id="loginTab" type="button">Sign In</button>
        <button class="tab" id="registerTab" type="button">Sign Up</button>
      </div>

      <div class="flashwrap">
        {% with msgs = get_flashed_messages(with_categories=true) %}
          {% if msgs %}
            {% for cat, msg in msgs %}
              <div class="flash {{ cat }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
      </div>

      <form id="loginForm" class="active" action="/login" method="post">
        <div class="field">
          <label>Email or Username</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M6.5 7.5 12 12l5.5-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input name="login_id" type="text" placeholder="you@example.com or johndoe" required />
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7.5 10V8.2A4.5 4.5 0 0 1 12 3.7a4.5 4.5 0 0 1 4.5 4.5V10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v5A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-5A2.5 2.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
            </svg>

            <input id="loginPassword" name="password" type="password" placeholder="••••••••" required />

            <button class="eye" type="button"
                    aria-label="Show or hide password"
                    data-target="loginPassword">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn" type="submit">Sign In</button>

        <div class="linkrow">
          Don't have an account? <a href="#" id="goRegister">Sign up</a>
        </div>
      </form>

      <form id="registerForm" action="/register" method="post">
        <div class="field">
          <label>Username</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M4.5 20.2c1.3-4 5-6 7.5-6s6.2 2 7.5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <input name="username" type="text" placeholder="johndoe" required />
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M6.5 7.5 12 12l5.5-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input name="email" type="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7.5 10V8.2A4.5 4.5 0 0 1 12 3.7a4.5 4.5 0 0 1 4.5 4.5V10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v5A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-5A2.5 2.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
            </svg>

            <input id="regPassword" name="password" type="password" placeholder="••••••••" required />

            <button class="eye" type="button"
                    aria-label="Show or hide password"
                    data-target="regPassword">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <div class="control">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7.5 10V8.2A4.5 4.5 0 0 1 12 3.7a4.5 4.5 0 0 1 4.5 4.5V10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v5A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-5A2.5 2.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
            </svg>

            <input id="regConfirm" name="confirm_password" type="password" placeholder="••••••••" required />

            <button class="eye" type="button"
                    aria-label="Show or hide confirm password"
                    data-target="regConfirm">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn" type="submit">Create Account</button>

        <div class="linkrow">
          Already have an account? <a href="#" id="goLogin">Sign in</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const titleText = document.getElementById("titleText");
    const subText = document.getElementById("subText");

    function showLogin(){
      loginTab.classList.add("active");
      registerTab.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
      titleText.textContent = "Welcome Back";
      subText.textContent = "Sign in to access your inventory";
    }

    function showRegister(){
      registerTab.classList.add("active");
      loginTab.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
      titleText.textContent = "Create Account";
      subText.textContent = "Register to start managing your parts";
    }

    loginTab.addEventListener("click", showLogin);
    registerTab.addEventListener("click", showRegister);

    document.getElementById("goRegister").addEventListener("click", (e) => {
      e.preventDefault(); showRegister();
    });
    document.getElementById("goLogin").addEventListener("click", (e) => {
      e.preventDefault(); showLogin();
    });

    document.querySelectorAll(".eye").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-target");
        const input = document.getElementById(id);
        if(!input) return;
        input.type = (input.type === "password") ? "text" : "password";
      });
    });

    registerForm.addEventListener("submit", (e) => {
      const p1 = document.getElementById("regPassword").value;
      const p2 = document.getElementById("regConfirm").value;
      if(p1 !== p2){
        e.preventDefault();
        alert("Password and Confirm Password do not match.");
      }
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get("tab") === "register") showRegister();
    if (params.get("tab") === "login") showLogin();
  </script>
</body>
</html>
